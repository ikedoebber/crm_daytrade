services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: planilha_trader
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build: .
    command: gunicorn planilha_trader.wsgi:application --bind 0.0.0.0:8032 --timeout 120 --workers 2 --threads 2 --reload
    volumes:
      - .:/app
    ports:
      - "8032:8032"
    env_file:
      - .env
    depends_on:
      - db

volumes:
  pgdata: